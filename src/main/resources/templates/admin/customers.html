<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: htmlHeader('Quản Lý Khách Hàng')}"></head>

<body>
    <!-- Sidebar -->
    <div th:replace="~{admin/fragments :: sidebar('customers')}"></div>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
        <!-- Topbar -->
        <div th:replace="~{admin/fragments :: topbar('Quản Lý Khách Hàng & Uy Tín')}"></div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Filter & Action Card -->
            <div class="card" style="margin-bottom: 24px;">
                <div class="action-header">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="customerSearch" class="search-input" placeholder="Tìm theo mã KH, tên KH..." onkeyup="filterCustomers()">
                    </div>
                    
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <div>
                            <select id="statusFilter" class="form-select" style="padding: 10px 40px 10px 16px; width: 180px;" onchange="filterCustomers()">
                                <option value="ALL">Mọi trạng thái</option>
                                <option value="NORMAL">NORMAL</option>
                                <option value="WARNING">WARNING</option>
                                <option value="TEMP_BANNED">TEMP_BANNED</option>
                                <option value="BANNED">BANNED</option>
                            </select>
                        </div>
                        <button class="btn btn-secondary" onclick="loadCustomersData()">
                            <i class="fa-solid fa-rotate"></i> Làm mới
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table" id="customersTable">
                        <thead>
                            <tr>
                                <th>Mã Khách Hàng</th>
                                <th>Tên Khách Hàng</th>
                                <th>Trạng Thái</th>
                                <th>Số Đơn Thành Công</th>
                                <th>Chuỗi Hoàn Hàng</th>
                                <th>Số Lần Cảnh Báo</th>
                                <th>Tín Dụng Duyệt Sớm</th>
                                <th>Tổng Đơn Hoàn</th>
                                <th>Thời Gian Mở Khóa</th>
                                <th>Ngày Tạo</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody id="customersTableBody">
                            <tr>
                                <td colspan="11" style="text-align: center; color: var(--text-secondary);">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Customer Modal -->
    <div class="modal-overlay" id="editCustomerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Cập Nhật Trạng Thái Khách Hàng</h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editCustomerForm" onsubmit="submitEditCustomer(event)">
                    <input type="hidden" id="editCustomerCode">
                    <div class="form-group">
                        <label class="form-label" for="editCustomerName">Tên khách hàng</label>
                        <input class="form-input" type="text" id="editCustomerName" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editStatus">Trạng thái mới</label>
                        <select id="editStatus" class="form-select" required>
                            <option value="NORMAL">NORMAL (Bình thường)</option>
                            <option value="WARNING">WARNING (Cảnh báo hoàn hàng)</option>
                            <option value="TEMP_BANNED">TEMP_BANNED (Khóa tạm thời)</option>
                            <option value="BANNED">BANNED (Khóa vĩnh viễn)</option>
                        </select>
                    </div>
                    <div class="form-group" id="unbanAtFormGroup">
                        <label class="form-label" for="editUnbanAt">Thời gian mở khóa (unban_at)</label>
                        <input class="form-input" type="datetime-local" id="editUnbanAt">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editSuccessCount">Số đơn mua thành công</label>
                        <input class="form-input" type="number" id="editSuccessCount" min="0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editReturnStreak">Chuỗi hoàn trả liên tiếp</label>
                        <input class="form-input" type="number" id="editReturnStreak" min="0" required>
                    </div>
                    <div class="modal-footer" style="padding-bottom: 0; padding-right: 0;">
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script imports & Alert container -->
    <div th:replace="~{admin/fragments :: footerScripts}"></div>

    <script>
        let allCustomers = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadCustomersData();
        });

        async function loadCustomersData() {
            try {
                const response = await fetchWithAuth('/api/admin/customers');
                if (response) {
                    const data = await response.json();
                    allCustomers = data;
                    renderCustomers(data);
                }
            } catch (error) {
                console.error('Error fetching customers:', error);
                showAlert('Lỗi khi tải dữ liệu khách hàng!', 'error');
            }
        }

        function renderCustomers(customers) {
            const tbody = document.getElementById('customersTableBody');
            tbody.innerHTML = '';

            if (customers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" style="text-align: center; color: var(--text-secondary);">Không có khách hàng nào được ghi nhận</td></tr>`;
                return;
            }

            customers.forEach(customer => {
                const tr = document.createElement('tr');
                
                // Status badge
                let statusBadge = '';
                if (customer.status === 'NORMAL' || customer.status === 'NEW') {
                    statusBadge = `<span class="badge badge-info">NORMAL</span>`;
                } else if (customer.status === 'WARNING') {
                    statusBadge = `<span class="badge badge-warning">WARNING</span>`;
                } else if (customer.status === 'TEMP_BANNED') {
                    statusBadge = `<span class="badge" style="background-color: #e67e22; color: white;">TEMP_BANNED</span>`;
                } else if (customer.status === 'BANNED') {
                    statusBadge = `<span class="badge badge-danger">BANNED</span>`;
                } else {
                    statusBadge = `<span class="badge">${customer.status}</span>`;
                }

                // Streak alerts (if streak > 0 highlights potential cheat)
                const streakLabel = customer.returnStreak > 0 
                    ? `<span style="color:var(--color-danger); font-weight:600;">${customer.returnStreak} <i class="fa-solid fa-triangle-exclamation"></i></span>`
                    : `<span>0</span>`;

                tr.innerHTML = `
                    <td style="font-weight: 600; color: var(--color-secondary);">${customer.customerCode || '-'}</td>
                    <td>${customer.customerName || '-'}</td>
                    <td>${statusBadge}</td>
                    <td>${customer.successCount}</td>
                    <td>${streakLabel}</td>
                    <td>${customer.warningCount}</td>
                    <td>
                        <span style="background: rgba(241, 196, 15, 0.15); color: #f1c40f; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 0.85rem;">
                            <i class="fa-solid fa-bolt"></i> ${customer.earlyHatchCredits}
                        </span>
                    </td>
                    <td>
                        <span style="font-weight: 600; color: ${customer.returnCount > 0 ? '#e74c3c' : 'var(--text-secondary)'};">
                            ${customer.returnCount}
                        </span>
                    </td>
                    <td>${customer.unbanAt || '-'}</td>
                    <td>${formatDateTime(customer.createdAt)}</td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size:12px;" onclick="openEditModal('${customer.customerCode}', '${customer.customerName}', '${customer.status}', ${customer.successCount}, ${customer.returnStreak}, '${customer.unbanAt || ''}')">
                            <i class="fa-solid fa-pen-to-square"></i> Sửa
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterCustomers() {
            const query = document.getElementById('customerSearch').value.toLowerCase().trim();
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allCustomers.filter(customer => {
                const codeMatch = (customer.customerCode || '').toLowerCase().includes(query);
                const nameMatch = (customer.customerName || '').toLowerCase().includes(query);
                
                const statusMatch = statusFilter === 'ALL' || customer.status === statusFilter;

                return (codeMatch || nameMatch) && statusMatch;
            });

            renderCustomers(filtered);
        }

        function openEditModal(code, name, status, successCount, returnStreak, unbanAt) {
            document.getElementById('editCustomerCode').value = code;
            document.getElementById('editCustomerName').value = name;
            document.getElementById('editStatus').value = status;
            document.getElementById('editSuccessCount').value = successCount;
            document.getElementById('editReturnStreak').value = returnStreak;
            document.getElementById('editUnbanAt').value = unbanAt ? unbanAt.substring(0, 16) : '';
            
            document.getElementById('editCustomerModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editCustomerModal').classList.remove('active');
        }

        async function submitEditCustomer(e) {
            e.preventDefault();
            const code = document.getElementById('editCustomerCode').value;
            const status = document.getElementById('editStatus').value;
            const successCount = parseInt(document.getElementById('editSuccessCount').value);
            const returnStreak = parseInt(document.getElementById('editReturnStreak').value);
            const unbanAtVal = document.getElementById('editUnbanAt').value;
            const unbanAt = unbanAtVal ? unbanAtVal : null;

            try {
                const response = await fetchWithAuth(`/api/admin/customers/${code}/status`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        status,
                        successCount,
                        returnStreak,
                        unbanAt
                    })
                });

                if (response && response.ok) {
                    showAlert('Cập nhật trạng thái khách hàng thành công!', 'success');
                    closeEditModal();
                    loadCustomersData();
                } else {
                    showAlert('Không thể cập nhật khách hàng!', 'error');
                }
            } catch (error) {
                console.error('Error updating customer status:', error);
                showAlert('Lỗi khi gửi yêu cầu cập nhật!', 'error');
            }
        }
    </script>
</body>
</html>
