<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: htmlHeader('Đăng Nhập')}"></head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-title">ADMIN PORTAL</h2>
            <p class="auth-desc">Đăng nhập hệ thống quản lý game ấp trứng</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <input class="form-input" type="text" id="username" placeholder="Nhập username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <input class="form-input" type="password" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px; height: 45px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Đăng Nhập
                </button>
            </form>
        </div>
    </div>

    <!-- Alert and general functions -->
    <div th:replace="~{admin/fragments :: footerScripts}"></div>
    
    <script>
        // If already logged in with token, go straight to dashboard
        if (localStorage.getItem('admin_token')) {
            window.location.href = '/admin/dashboard';
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;

            if (!usernameInput || !passwordInput) {
                showAlert('Vui lòng điền đầy đủ thông tin!', 'error');
                return;
            }

            try {
                const response = await fetch('/api/admin/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('admin_token', data.accessToken);
                    localStorage.setItem('admin_username', data.username);
                    showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 800);
                } else {
                    const errorText = await response.text();
                    showAlert('Đăng nhập thất bại: Tài khoản hoặc mật khẩu không chính xác!', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Không thể kết nối đến máy chủ!', 'error');
            }
        }
    </script>
</body>
</html>
