<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments :: htmlHeader('Sản Phẩm & Ánh Xạ Trứng')}"></head>

<body>
    <!-- Sidebar -->
    <div th:replace="~{admin/fragments :: sidebar('products')}"></div>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper">
        <!-- Topbar -->
        <div th:replace="~{admin/fragments :: topbar('Cấu Hình Ánh Xạ Sản Phẩm KiotViet')}"></div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Action Header Card -->
            <div class="card" style="margin-bottom: 24px;">
                <div class="action-header">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="productSearch" class="search-input" placeholder="Tìm theo tên SP, SKU, ID KiotViet..." onkeyup="filterProducts()">
                    </div>
                    
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <button class="btn btn-primary" id="btnSyncProducts" onclick="syncProducts()">
                            <i class="fa-solid fa-cloud-arrow-down"></i> Đồng bộ từ KiotViet
                        </button>
                        <button class="btn btn-secondary" onclick="loadProductsData()">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table" id="productsTable">
                        <thead>
                            <tr>
                                <th style="width: 80px;">Ảnh</th>
                                <th>ID KiotViet</th>
                                <th>SKU</th>
                                <th>Tên Sản Phẩm</th>
                                <th>Giá Gốc (VND)</th>
                                <th>Trứng Thường (Loại 1)</th>
                                <th>Trứng Ấp (Loại 2)</th>
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr>
                                <td colspan="8" style="text-align: center; color: var(--text-secondary);">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Mapping Modal -->
    <div class="modal-overlay" id="mappingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Tạo Ánh Xạ Sản Phẩm - Bể Quà</h3>
                <button class="modal-close" onclick="closeMappingModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mappingForm" onsubmit="submitMapping(event)">
                    <input type="hidden" id="mappingProductId">
                    
                    <div class="form-group">
                        <label class="form-label">Sản phẩm chọn</label>
                        <input class="form-input" type="text" id="mappingProductName" readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="mappingPoolId">Bể quà tặng liên kết</label>
                        <select id="mappingPoolId" class="form-select" required>
                            <option value="">-- Đang tải bể quà --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="mappingType">Nhóm trứng áp dụng</label>
                        <select id="mappingType" class="form-select" required>
                            <option value="1">Trứng thường (Egg Type 1 - Nhận ngay)</option>
                            <option value="2">Trứng ấp (Egg Type 2 - Đếm ngược 15 ngày)</option>
                        </select>
                    </div>

                    <div class="modal-footer" style="padding-bottom: 0; padding-right: 0;">
                        <button type="button" class="btn btn-secondary" onclick="closeMappingModal()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Tạo liên kết</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Rates Configuration Modal -->
    <div class="modal-overlay" id="ratesModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Cấu hình Tỉ lệ phát trứng</h3>
                <button class="modal-close" onclick="closeRatesModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="ratesForm" onsubmit="submitRates(event)">
                    <input type="hidden" id="ratesProductId">
                    
                    <div class="form-group">
                        <label class="form-label">Sản phẩm chọn</label>
                        <input class="form-input" type="text" id="ratesProductName" readonly>
                    </div>
                    
                    <div id="ratesListContainer" style="margin-bottom: 20px; max-height: 250px; overflow-y: auto; padding-right: 4px;">
                        <!-- Mappings rates inputs will be populated here -->
                    </div>



                    <div class="modal-footer" style="padding-bottom: 0; padding-right: 0;">
                        <button type="button" class="btn btn-secondary" onclick="closeRatesModal()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu tỉ lệ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Qty Configuration Modal -->
    <div class="modal-overlay" id="qtyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Cấu hình số trứng phát</h3>
                <button class="modal-close" onclick="closeQtyModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="qtyForm" onsubmit="submitQty(event)">
                    <input type="hidden" id="qtyProductId">
                    
                    <div class="form-group">
                        <label class="form-label">Sản phẩm chọn</label>
                        <input class="form-input" type="text" id="qtyProductName" readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="qtyEggType1">Số trứng Thường (Loại 1) phát cho mỗi sản phẩm</label>
                        <input class="form-input" type="number" id="qtyEggType1" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="qtyEggType2">Số trứng Ấp (Loại 2) phát cho mỗi sản phẩm</label>
                        <input class="form-input" type="number" id="qtyEggType2" min="0" required>
                    </div>

                    <div class="modal-footer" style="padding-bottom: 0; padding-right: 0;">
                        <button type="button" class="btn btn-secondary" onclick="closeQtyModal()">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu cấu hình</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script imports & Alert container -->
    <div th:replace="~{admin/fragments :: footerScripts}"></div>

    <script>
        let allProducts = [];
        let allPools = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadProductsData();
            loadPoolsData();
        });

        async function loadProductsData() {
            try {
                const response = await fetchWithAuth('/api/admin/products');
                if (response) {
                    const data = await response.json();
                    allProducts = data;
                    renderProducts(data);
                }
            } catch (error) {
                console.error('Error fetching products:', error);
                showAlert('Lỗi khi tải danh sách sản phẩm!', 'error');
            }
        }

        async function loadPoolsData() {
            try {
                const response = await fetchWithAuth('/api/admin/gift-pools');
                if (response) {
                    allPools = await response.json();
                    populatePoolsSelect();
                }
            } catch (error) {
                console.error('Error fetching pools:', error);
            }
        }

        function populatePoolsSelect() {
            const select = document.getElementById('mappingPoolId');
            select.innerHTML = '<option value="">Chọn bể quà tương ứng...</option>';
            allPools.forEach(pool => {
                const opt = document.createElement('option');
                opt.value = pool.id;
                opt.textContent = `${pool.poolName} (Tier ${pool.tier})`;
                select.appendChild(opt);
            });
        }

        function renderProducts(products) {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';

            if (products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: var(--text-secondary);">Không có sản phẩm nào. Nhấp "Đồng bộ" để lấy dữ liệu.</td></tr>`;
                return;
            }

            products.forEach(prod => {
                const tr = document.createElement('tr');
                
                // Image
                const imgTag = prod.imageUrl 
                    ? `<img src="${prod.imageUrl}" alt="${prod.name}" style="width: 50px; height: 50px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border-color);">`
                    : `<div style="width: 50px; height: 50px; border-radius: 6px; background-color: rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; color:var(--text-secondary);"><i class="fa-solid fa-image"></i></div>`;

                const formattedPrice = new Intl.NumberFormat('vi-VN').format(prod.basePrice || 0);

                // Mappings layouts
                let mappingsLayoutType1 = '';
                let mappingsLayoutType2 = '';

                if (prod.mappings && prod.mappings.length > 0) {
                    prod.mappings.forEach(m => {
                        const poolName = m.giftPool ? m.giftPool.poolName : 'Bể quà không rõ';
                        const tier = m.giftPool ? m.giftPool.tier : '-';
                        const rateText = typeof m.rate === 'number' ? `${m.rate.toFixed(1)}%` : '100%';

                        const itemHtml = `
                            <div class="mapping-tag" style="margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.02);">
                                <span><strong>${poolName} (Tier ${tier})</strong> <span class="badge badge-info" style="font-size:10px; padding: 2px 6px;">${rateText}</span></span>
                                <span class="mapping-tag-delete" title="Xóa" onclick="deleteMapping('${m.id}')" style="cursor:pointer; font-weight:bold; color: var(--text-secondary);">&times;</span>
                            </div>
                        `;

                        if (m.mappingsType === 2) {
                            mappingsLayoutType2 += itemHtml;
                        } else {
                            mappingsLayoutType1 += itemHtml;
                        }
                    });
                }

                if (!mappingsLayoutType1) {
                    mappingsLayoutType1 = `<span style="font-size:12px; color:var(--text-secondary);">Chưa thiết lập</span>`;
                }
                if (!mappingsLayoutType2) {
                    mappingsLayoutType2 = `<span style="font-size:12px; color:var(--text-secondary);">Chưa thiết lập</span>`;
                }

                tr.innerHTML = `
                    <td>${imgTag}</td>
                    <td style="font-family:monospace; font-size:13px;">${prod.kvProductId}</td>
                    <td style="font-family:monospace; font-size:13px; color:var(--text-secondary);">${prod.code || '-'}</td>
                    <td style="font-weight:600; color:var(--text-primary); max-width: 250px;">${prod.name || '-'}</td>
                    <td>${formattedPrice}</td>
                    <td>
                        <div style="display:flex; flex-direction:column; gap: 4px;">
                            <div style="display: inline-block; font-size:11px; font-weight:600; color: #4caf50; background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.2); padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; width: fit-content;"><i class="fa-solid fa-egg"></i> Phát: ${prod.eggType1Qty !== undefined ? prod.eggType1Qty : 1} quả</div>
                            ${mappingsLayoutType1}
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; flex-direction:column; gap: 4px;">
                            <div style="display: inline-block; font-size:11px; font-weight:600; color: #ff9800; background: rgba(255, 152, 0, 0.1); border: 1px solid rgba(255, 152, 0, 0.2); padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; width: fit-content;"><i class="fa-solid fa-egg"></i> Phát: ${prod.eggType2Qty !== undefined ? prod.eggType2Qty : 1} quả</div>
                            ${mappingsLayoutType2}
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; gap:6px; flex-wrap: wrap;">
                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size:12px;" onclick="openMappingModal(${prod.kvProductId}, '${prod.name.replace(/'/g, "\\'")}')">
                                <i class="fa-solid fa-link"></i> Thêm Ánh Xạ
                            </button>
                            ${prod.mappings && prod.mappings.length > 0 ? `
                                <button class="btn btn-secondary" style="padding: 6px 12px; font-size:12px; background-color: rgba(255,255,255,0.05);" onclick="openRatesModal(${prod.kvProductId}, '${prod.name.replace(/'/g, "\\'")}')">
                                    <i class="fa-solid fa-percent"></i> Tỉ lệ
                                </button>
                            ` : ''}
                            <button class="btn btn-secondary" style="padding: 6px 12px; font-size:12px; background-color: rgba(76, 175, 80, 0.05); color: #4caf50; border-color: rgba(76, 175, 80, 0.2);" onclick="openQtyModal(${prod.kvProductId}, '${prod.name.replace(/'/g, "\\'")}', ${prod.eggType1Qty !== undefined ? prod.eggType1Qty : 1}, ${prod.eggType2Qty !== undefined ? prod.eggType2Qty : 1})">
                                <i class="fa-solid fa-egg"></i> Số trứng
                            </button>
                        </div>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterProducts() {
            const query = document.getElementById('productSearch').value.toLowerCase().trim();
            const filtered = allProducts.filter(prod => {
                const idMatch = prod.kvProductId.toString().includes(query);
                const nameMatch = (prod.name || '').toLowerCase().includes(query);
                const codeMatch = (prod.code || '').toLowerCase().includes(query);
                return idMatch || nameMatch || codeMatch;
            });
            renderProducts(filtered);
        }

        // Modals control
        function openMappingModal(productId, productName) {
            document.getElementById('mappingForm').reset();
            document.getElementById('mappingProductId').value = productId;
            document.getElementById('mappingProductName').value = productName;
            populatePoolsSelect(); // Refresh pool selections
            document.getElementById('mappingModal').classList.add('active');
        }
        
        function closeMappingModal() {
            document.getElementById('mappingModal').classList.remove('active');
        }

        // Sync Products Action
        async function syncProducts() {
            const btn = document.getElementById('btnSyncProducts');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang đồng bộ...';

            try {
                const response = await fetchWithAuth('/api/admin/products/sync/all', {
                    method: 'POST'
                });

                if (response && response.ok) {
                    const rowAdded = await response.json();
                    showAlert(`Đồng bộ thành công! Đã thêm mới/cập nhật ${rowAdded} sản phẩm.`, 'success');
                    loadProductsData();
                } else {
                    showAlert('Đồng bộ sản phẩm thất bại!', 'error');
                }
            } catch (error) {
                console.error('Sync error:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // Form Submit
        async function submitMapping(e) {
            e.preventDefault();
            const productId = parseInt(document.getElementById('mappingProductId').value);
            const poolId = document.getElementById('mappingPoolId').value;
            const mappingsType = parseInt(document.getElementById('mappingType').value);

            if (!poolId) {
                showAlert('Vui lòng chọn bể quà!', 'warning');
                return;
            }

            try {
                const response = await fetchWithAuth('/api/admin/product-egg-mappings', {
                    method: 'POST',
                    body: JSON.stringify({ productId, poolId, mappingsType })
                });

                if (response && response.ok) {
                    showAlert('Tạo cấu hình ánh xạ thành công!', 'success');
                    closeMappingModal();
                    loadProductsData();
                } else {
                    const errorObj = await response.json().catch(() => null);
                    const errorMsg = errorObj && errorObj.message ? errorObj.message : 'Tạo cấu hình ánh xạ thất bại!';
                    showAlert(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Mapping submit error:', error);
            }
        }

        // Delete Mapping
        async function deleteMapping(mappingId) {
            if (!confirm('Bạn có chắc chắn muốn xóa cấu hình ánh xạ trứng này?')) return;

            try {
                const response = await fetchWithAuth(`/api/admin/product-egg-mappings/${mappingId}`, {
                    method: 'DELETE'
                });

                if (response && response.ok) {
                    showAlert('Xóa quy tắc ánh xạ thành công!', 'success');
                    loadProductsData();
                } else {
                    showAlert('Xóa thất bại!', 'error');
                }
            } catch (error) {
                console.error('Delete mapping error:', error);
            }
        }

        // Rates Configuration Modals Control
        function openRatesModal(productId, productName) {
            document.getElementById('ratesProductId').value = productId;
            document.getElementById('ratesProductName').value = productName;
            
            const product = allProducts.find(p => p.kvProductId === productId);
            const container = document.getElementById('ratesListContainer');
            container.innerHTML = '';

            if (product && product.mappings) {
                const group1 = product.mappings.filter(m => m.mappingsType !== 2);
                const group2 = product.mappings.filter(m => m.mappingsType === 2);

                if (group1.length > 0) {
                    const h4 = document.createElement('h4');
                    h4.textContent = 'Nhóm Trứng Thường (Loại 1)';
                    h4.style.margin = '10px 0 6px 0';
                    h4.style.color = '#4caf50';
                    container.appendChild(h4);

                    group1.forEach(m => {
                        createRateInputRow(m, container, 1);
                    });

                    const totalDiv = document.createElement('div');
                    totalDiv.style.textAlign = 'right';
                    totalDiv.style.marginBottom = '12px';
                    totalDiv.style.fontWeight = 'bold';
                    totalDiv.innerHTML = `Tổng nhóm 1: <span id="totalGroup1RateLabel">0.0%</span>`;
                    container.appendChild(totalDiv);
                }

                if (group2.length > 0) {
                    const h4 = document.createElement('h4');
                    h4.textContent = 'Nhóm Trứng Ấp (Loại 2)';
                    h4.style.margin = '16px 0 6px 0';
                    h4.style.color = '#ff9800';
                    container.appendChild(h4);

                    group2.forEach(m => {
                        createRateInputRow(m, container, 2);
                    });

                    const totalDiv = document.createElement('div');
                    totalDiv.style.textAlign = 'right';
                    totalDiv.style.marginBottom = '12px';
                    totalDiv.style.fontWeight = 'bold';
                    totalDiv.innerHTML = `Tổng nhóm 2: <span id="totalGroup2RateLabel">0.0%</span>`;
                    container.appendChild(totalDiv);
                }
            }
            
            calculateTotalRates();
            document.getElementById('ratesModal').classList.add('active');
        }

        function createRateInputRow(m, container, groupType) {
            const poolName = m.giftPool ? m.giftPool.poolName : 'Bể quà không rõ';
            const tier = m.giftPool ? m.giftPool.tier : '-';
            
            const div = document.createElement('div');
            div.className = 'form-group';
            div.style.marginBottom = '8px';
            div.innerHTML = `
                <label class="form-label" style="font-size: 13px;">${poolName} (Tier ${tier})</label>
                <div style="display:flex; align-items:center; gap: 8px;">
                    <input class="form-input rate-input" type="number" step="0.1" min="0" max="100" data-mapping-id="${m.id}" data-group-type="${groupType}" value="${m.rate || 0}" oninput="calculateTotalRates()" required>
                    <span style="font-weight:600; color: var(--text-primary);">%</span>
                </div>
            `;
            container.appendChild(div);
        }

        function calculateTotalRates() {
            // Group 1
            const inputs1 = document.querySelectorAll('.rate-input[data-group-type="1"]');
            let sum1 = 0.0;
            inputs1.forEach(input => {
                sum1 += parseFloat(input.value) || 0.0;
            });
            const label1 = document.getElementById('totalGroup1RateLabel');
            if (label1) {
                label1.textContent = `${sum1.toFixed(1)}%`;
                label1.style.color = Math.abs(sum1 - 100.0) < 0.05 ? '#10B981' : '#EF4444';
            }

            // Group 2
            const inputs2 = document.querySelectorAll('.rate-input[data-group-type="2"]');
            let sum2 = 0.0;
            inputs2.forEach(input => {
                sum2 += parseFloat(input.value) || 0.0;
            });
            const label2 = document.getElementById('totalGroup2RateLabel');
            if (label2) {
                label2.textContent = `${sum2.toFixed(1)}%`;
                label2.style.color = Math.abs(sum2 - 100.0) < 0.05 ? '#10B981' : '#EF4444';
            }
        }

        function closeRatesModal() {
            document.getElementById('ratesModal').classList.remove('active');
        }

        async function submitRates(e) {
            e.preventDefault();
            const productId = parseInt(document.getElementById('ratesProductId').value);
            const inputs = document.querySelectorAll('.rate-input');
            
            const requests = [];
            const sums = { "1": 0.0, "2": 0.0 };
            inputs.forEach(input => {
                const mappingId = input.getAttribute('data-mapping-id');
                const groupType = input.getAttribute('data-group-type');
                const rate = parseFloat(input.value) || 0.0;
                sums[groupType] += rate;
                requests.push({ mappingId, rate });
            });

            // Validate sums
            if (sums["1"] > 0 && Math.abs(sums["1"] - 100.0) > 0.05) {
                showAlert(`Tổng tỉ lệ nhóm Trứng thường phải bằng 100% (Hiện tại: ${sums["1"].toFixed(1)}%)`, 'warning');
                return;
            }
            if (sums["2"] > 0 && Math.abs(sums["2"] - 100.0) > 0.05) {
                showAlert(`Tổng tỉ lệ nhóm Trứng ấp phải bằng 100% (Hiện tại: ${sums["2"].toFixed(1)}%)`, 'warning');
                return;
            }

            try {
                const response = await fetchWithAuth(`/api/admin/product-egg-mappings/products/${productId}/rates`, {
                    method: 'PUT',
                    body: JSON.stringify(requests)
                });

                if (response && response.ok) {
                    showAlert('Cấu hình tỉ lệ thành công!', 'success');
                    closeRatesModal();
                    loadProductsData();
                } else {
                    const errorObj = await response.json().catch(() => null);
                    const errorMsg = errorObj && errorObj.message ? errorObj.message : 'Lưu cấu hình tỉ lệ thất bại!';
                    showAlert(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Rates submit error:', error);
            }
        }

        // Qty Configuration Modal Control
        function openQtyModal(productId, productName, eggType1Qty, eggType2Qty) {
            document.getElementById('qtyProductId').value = productId;
            document.getElementById('qtyProductName').value = productName;
            document.getElementById('qtyEggType1').value = eggType1Qty;
            document.getElementById('qtyEggType2').value = eggType2Qty;
            document.getElementById('qtyModal').classList.add('active');
        }

        function closeQtyModal() {
            document.getElementById('qtyModal').classList.remove('active');
        }

        async function submitQty(e) {
            e.preventDefault();
            const productId = parseInt(document.getElementById('qtyProductId').value);
            const eggType1Qty = parseInt(document.getElementById('qtyEggType1').value);
            const eggType2Qty = parseInt(document.getElementById('qtyEggType2').value);

            try {
                const response = await fetchWithAuth(`/api/admin/products/${productId}/egg-quantities`, {
                    method: 'PUT',
                    body: JSON.stringify({ eggType1Qty, eggType2Qty })
                });

                if (response && response.ok) {
                    showAlert('Cấu hình số trứng phát thành công!', 'success');
                    closeQtyModal();
                    loadProductsData();
                } else {
                    const errorObj = await response.json().catch(() => null);
                    const errorMsg = errorObj && errorObj.message ? errorObj.message : 'Cấu hình số lượng trứng thất bại!';
                    showAlert(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Qty submit error:', error);
            }
        }
    </script>
</body>
</html>
